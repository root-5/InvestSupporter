services:
    app:
        build:
            context: .
            dockerfile: ./containers/app/app.dockerfile
        tty: true  # コンテナを起動したままにする
        env_file:
            - ./containers/app/.env
        environment:
            - TZ=Asia/Tokyo
        ports:
            - 7203:8080
        networks:
            - backend
        depends_on:
            - db
        restart: always
    db:
        build:
            context: .
            dockerfile: ./containers/db/db.dockerfile
        env_file:
            - ./containers/db/.env
        environment:
            - TZ=Asia/Tokyo
        volumes:
            - ./containers/db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d/
            - ./containers/db/data:/var/lib/postgresql
            - ./containers/db/backup:/var/lib/postgresql/backup
        ports:
            - 5432:5432
        networks:
            - backend
        restart: always
    observer:
        build:
            context: .
            dockerfile: ./containers/observer/observer.dockerfile
        tty: true
        env_file:
            - ./containers/observer/.env
        environment:
            - TZ=Asia/Tokyo
        volumes:
            - ./containers/observer/log:/log
        networks:
            - backend
        restart: always

networks:
    backend:
        driver: bridge
