name: deploy-to-gcp-vm


# main ブランチ変更時に GCP VM にアプリケーションを更新するワークフロー
# 事前に GitHub のシークレット (Settings > Secrets and variables > Actions) に以下を登録しておく必要がある
# - GCP_PROJECT_ID: GCP プロジェクト ID
# - GCP_WORKLOAD_IDENTITY_PROVIDER: Workload Identity Federation プロバイダのリソース名
# - GCP_SERVICE_ACCOUNT_EMAIL: GCP サービスアカウントのメールアドレス
# - GCP_ZONE: デプロイ先 VM インスタンスのゾーン (例: asia-northeast1-a)


# main ブランチへのプッシュ時にトリガー
on:
  push:
    branches: ["main"]

# GitHub Actions の権限設定
# 詳細: https://docs.github.com/ja/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read  # コードの読み取り権限
  id-token: write  # Workload Identity Federation 用の ID トークン発行権限

# ジョブ定義
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 認証 (Workload Identity Federation)  # https://github.com/google-github-actions/auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: gcloud コマンドのセットアップ  # https://github.com/google-github-actions/setup-gcloud、version は指定せず latest を使用
        uses: google-github-actions/setup-gcloud@v2

      - name: デプロイコマンドを実行 (将来的に権限や terraform/compute.tf 含め修正必要)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ZONE: ${{ secrets.GCP_ZONE }}
        run: |
          gcloud compute ssh invest-supporter-app \
            --zone="$ZONE" \
            --project="$PROJECT_ID" \
            --command="sudo -u appuser bash -c \"cd /home/appuser/InvestSupporter && git pull && bash cicd/update_app.sh\"" \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --quiet
